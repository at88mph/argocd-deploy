apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: src-kawfee-ca-storage-ui-staging
  namespace: argocd
  labels:
    argocd.argoproj.io/domain: kawfee.ca
    argocd.argoproj.io/environment: staging
    argocd.argoproj.io/service: storage-ui
spec:
  project: canfar
  sources:
    - repoURL: https://images-rc.canfar.net/chartrepo/skaha-system
      chart: storageui
      targetRevision: 0.10.1
      helm:
        valueFiles:
          - $values/helm/values/src.kawfee.ca/storage-ui/base.yaml
          - $values/helm/values/src.kawfee.ca/storage-ui/staging.yaml
    - repoURL: https://github.com/at88mph/argocd-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
