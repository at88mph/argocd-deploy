apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: src-kawfee-ca-cavern-staging
  namespace: argocd
  labels:
    argocd.argoproj.io/domain: kawfee.ca
    argocd.argoproj.io/environment: staging
    argocd.argoproj.io/service: cavern
spec:
  project: canfar
  sources:
    - repoURL: https://images-rc.canfar.net/chartrepo/skaha-system
      chart: cavern
      targetRevision: 0.10.3
      helm:
        valueFiles:
          - $values/helm/values/src.kawfee.ca/cavern/base.yaml
          - $values/helm/values/src.kawfee.ca/cavern/staging.yaml
    - repoURL: https://github.com/at88mph/argocd-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
