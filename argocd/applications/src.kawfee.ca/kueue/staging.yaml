apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: src-kawfee-ca-kueue-staging
  namespace: argocd
  labels:
    argocd.argoproj.io/domain: kawfee.ca
    argocd.argoproj.io/environment: staging
    argocd.argoproj.io/service: kueue
spec:
  project: canfar
  source:
    repoURL: https://github.com/cadc-ccda-infra/keel-deploy.git
    targetRevision: main
    path: helm/values/src.kawfee.ca/kueue
    directory:
      recurse: true
      include: '{localQueues/staging.yml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-workloads
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
