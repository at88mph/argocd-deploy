apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: src-kawfee-ca-posix-mapper-staging
  namespace: argocd
  labels:
    argocd.argoproj.io/domain: kawfee.ca
    argocd.argoproj.io/environment: staging
    argocd.argoproj.io/service: posix-mapper
spec:
  project: canfar
  sources:
    - repoURL: https://images.opencadc.org/chartrepo/platform
      chart: posixmapper
      targetRevision: 0.5.0
      helm:
        valueFiles:
          - $values/helm/values/src.kawfee.ca/posix-mapper/base.yaml
          - $values/helm/values/src.kawfee.ca/posix-mapper/staging.yaml
    - repoURL: https://github.com/at88mph/argocd-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
