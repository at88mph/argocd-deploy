# Parent Application (app-of-apps) for canfar.net.
# Apply once: kubectl apply -f argocd/bootstrap/canfar.net.yaml
# Replace spec.source.repoURL with this repository's clone URL before applying.
# Child and parent Application CRs use namespace canfar-argocd; create it and grant Argo CD
# permission to manage Application resources there (cluster setup dependent).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: src-kawfee-ca-apps
  namespace: argocd
spec:
  project: canfar
  source:
    repoURL: https://github.com/at88mph/argocd-deploy.git
    targetRevision: main
    ref: values
    path: argocd/applications/src.kawfee.ca
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true