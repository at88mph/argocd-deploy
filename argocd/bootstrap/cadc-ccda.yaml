# Parent Application (app-of-apps) for cadc-ccda.
# Apply once: kubectl apply -f argocd/bootstrap/cadc-ccda.yaml
# Replace spec.source.repoURL with this repository's clone URL before applying.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cadc-ccda-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://git.example.com/your-org/argo-deploy.git
    targetRevision: main
    path: argocd/applications/cadc-ccda
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
