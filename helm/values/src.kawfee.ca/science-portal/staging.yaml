# src.kawfee.ca staging — science-portal chart 2.0.0 (Next.js).
# Aligns with deployment/science-platform/kawfee/src.kawfee.ca/science-portal/values.yaml
# where applicable; OIDC redirect URIs follow NextAuth (/api/auth/callback/oidc).

replicaCount: 1

image:
  pullPolicy: Always

app:
  basePath: /science-portal
  useCanfar: false
  experimental: false

  api:
    storage: https://src.kawfee.ca/cavern/nodes/home/
    skaha: https://src.kawfee.ca/skaha
    srcSkaha: https://src.kawfee.ca/skaha
    cavern: https://src.kawfee.ca/cavern
    srcCavern: https://src.kawfee.ca/cavern
    timeoutMs: "30000"

  publicApi:
    skaha: https://src.kawfee.ca/skaha
    cavern: https://src.kawfee.ca/cavern
    srcSkaha: https://src.kawfee.ca/skaha
    srcCavern: https://src.kawfee.ca/cavern
    timeoutMs: "30000"

  oidc:
    enabled: true
    uri: https://ska-iam.stfc.ac.uk/
    clientId: ffc508c0-b599-456b-b124-e4cfd2358e03
    callbackUri: https://src.kawfee.ca/science-portal
    redirectUri: https://src.kawfee.ca/science-portal/api/auth/callback/oidc
    scope: openid profile offline_access
    clientSecret:
      existingSecret: science-portal-oidc-secret-src
      secretKey: oidc-client-secret

  auth:
    trustHost: true
    nextauthUrl: https://src.kawfee.ca
    authSecret:
      existingSecret: science-portal-secrets
      secretKey: auth-secret

livenessProbe:
  httpGet:
    port: 3000
    path: /science-portal
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    port: 3000
    path: /science-portal/api/health
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    port: 3000
    path: /science-portal
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 30

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: src.kawfee.ca
      paths:
        - path: /science-portal
          pathType: Prefix
  tls: []
