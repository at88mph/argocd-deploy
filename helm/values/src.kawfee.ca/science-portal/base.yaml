# Shared defaults for science-portal Helm chart 2.x (Next.js app).
# Chart: https://github.com/canfar/science-portal — values schema matches chart 2.0.0+.

imagePullSecrets:
  - name: ghcr-science-portal

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

resources:
  requests:
    memory: 500Mi
    cpu: 500m
  limits:
    memory: 1Gi
    cpu: 750m

# Chart 2.0.0 templates reference these keys though defaults omit them.
podDisruptionBudget:
  enabled: false

networkPolicy:
  enabled: false
