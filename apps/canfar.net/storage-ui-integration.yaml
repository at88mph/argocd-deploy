apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canfar-storage-ui-integration
  namespace: argocd
  labels:
    argocd.argoproj.io/domain: canfar.net
    argocd.argoproj.io/environment: integration
    argocd.argoproj.io/service: storage-ui
spec:
  project: default
  sources:
    - repoURL: oci://harbor.example.com/canfar/charts
      chart: storage-ui
      targetRevision: 0.1.0
      helm:
        valueFiles:
          - $values/values/canfar.net/storage-ui/base.yaml
          - $values/values/canfar.net/storage-ui/integration.yaml
    - repoURL: https://git.example.com/your-org/argo-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-storage-ui-integration
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
