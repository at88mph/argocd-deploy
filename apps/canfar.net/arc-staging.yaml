apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canfar-arc-staging
  namespace: argocd
  labels:
    argocd.argoproj.io/domain: canfar.net
    argocd.argoproj.io/environment: staging
    argocd.argoproj.io/service: arc
spec:
  project: default
  sources:
    - repoURL: oci://harbor.example.com/canfar/charts
      chart: arc
      targetRevision: 0.1.0
      helm:
        valueFiles:
          - $values/values/canfar.net/arc/base.yaml
          - $values/values/canfar.net/arc/staging.yaml
    - repoURL: https://git.example.com/your-org/argo-deploy.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: canfar-arc-staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
